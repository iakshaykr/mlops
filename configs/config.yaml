seed: 42

data:
  kaggle_dataset: "ninadmehendale/multimodal-iris-fingerprint-biometric-data"
  raw_path: "data/IRIS and FINGERPRINT DATASET"
  volume_path: "/Volumes/iakshaykr/default/biometric_data"
  libraries_path: "/Volumes/iakshaykr/default/databricks-libs"
  image_size: 32
  batch_size: 32
  num_workers: 2
  pin_memory: false
  preprocessing:
    enabled: true
    cache_path: "data/preprocessed/biometric_cache"
    mode: "local"
    num_workers: 4
    num_partitions: 8
    force_rebuild: false

training:
  epochs: 3
  lr: 0.001

model:
  input_size: 3072
  hidden_size: 64
  output_size: 45
