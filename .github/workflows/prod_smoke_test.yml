name: Prod Smoke Test

on:
  workflow_dispatch:
    inputs:
      model_version:
        description: "Optional Unity Catalog model version for iakshaykr.default.prod"
        required: false
        type: string
      prediction_input_size:
        description: "Input feature size for the smoke test"
        required: false
        default: "3072"
        type: string

jobs:
  prod_smoke_test:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install "mlflow[databricks]"
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install --no-deps -e .

      - name: Azure login for Databricks SPN
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Microsoft Entra token for Azure Databricks
        id: databricks_aad_token
        run: |
          echo "token=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken \
            -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Smoke test prod model
        env:
          MLFLOW_TRACKING_URI: databricks
          MLFLOW_REGISTRY_URI: databricks-uc
          DATABRICKS_HOST: https://adb-6701353639688524.4.azuredatabricks.net
          DATABRICKS_TOKEN: ${{ steps.databricks_aad_token.outputs.token }}
          MODEL_NAME: iakshaykr.default.prod
          MODEL_VERSION: ${{ inputs.model_version }}
          PREDICTION_INPUT_SIZE: ${{ inputs.prediction_input_size }}
          PYTHONPATH: .
        run: python src/training/load_and_predict.py
