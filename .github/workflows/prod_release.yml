name: Prod Release

on:
  workflow_dispatch:
    inputs:
      validated_artifact_path:
        description: "ADLS artifact path under the container, for example prod/123456789-1"
        required: true
      batch_data_path:
        description: "Optional ADLS path to batch CSV for batch inference, for example prod/123456789-1/batch_sample.csv"
        required: false
        default: ""
      prod_live_input_values:
        description: "Optional JSON array or comma-separated feature vector for a final prod prediction"
        required: false
        default: ""

jobs:
  promote_to_prod:
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      promoted_model_version: ${{ steps.promote_to_prod.outputs.promoted_model_version }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install "mlflow[databricks]"
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install --no-deps -e .

      - name: Azure login for Databricks SPN
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Microsoft Entra token for Azure Databricks
        id: promotion_apply_databricks_aad_token
        run: |
          echo "token=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken \
            -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Download model artifacts from ADLS
        run: |
          set -eu
          prefix="${{ inputs.validated_artifact_path }}"
          dest_root="./promoted_model_artifacts/model"
          mkdir -p "$dest_root"

          blobs=$(az storage blob list \
            --account-name ${{ vars.AZURE_STORAGE_ACCOUNT }} \
            --container-name ${{ vars.AZURE_STORAGE_CONTAINER }} \
            --prefix "$prefix/" \
            --auth-mode login \
            --query "[].name" \
            -o tsv)

          if [ -z "$blobs" ]; then
            echo "No blobs found under $prefix/" >&2
            exit 1
          fi

          while IFS= read -r blob_name; do
            [ -n "$blob_name" ] || continue

            case "$blobs" in
              *"$blob_name/"*)
                echo "Skipping prefix marker blob: $blob_name"
                continue
                ;;
            esac

            relative_path="${blob_name#"$prefix/"}"
            target_path="$dest_root/$relative_path"
            mkdir -p "$(dirname "$target_path")"

            az storage blob download \
              --account-name ${{ vars.AZURE_STORAGE_ACCOUNT }} \
              --container-name ${{ vars.AZURE_STORAGE_CONTAINER }} \
              --name "$blob_name" \
              --file "$target_path" \
              --auth-mode login \
              --overwrite true \
              --no-progress
          done <<EOF
          $blobs
          EOF

      - name: Show promotion source paths
        run: |
          echo "ADLS source path: https://${{ vars.AZURE_STORAGE_ACCOUNT }}.blob.core.windows.net/${{ vars.AZURE_STORAGE_CONTAINER }}/${{ inputs.validated_artifact_path }}/"
          echo "Local registration path: ./promoted_model_artifacts/model"

      - name: Promote validated UC model version to Prod
        id: promote_to_prod
        env:
          MLFLOW_TRACKING_URI: databricks
          MLFLOW_REGISTRY_URI: databricks-uc
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ steps.promotion_apply_databricks_aad_token.outputs.token }}
          SOURCE_MODEL_NAME: biometric_model
          SOURCE_UC_CATALOG: ${{ vars.UC_CATALOG }}
          SOURCE_UC_SCHEMA: ${{ vars.UC_SCHEMA }}
          DESTINATION_MODEL_NAME: ${{ vars.PROD_MODEL_NAME }}
          SKIP_DOWNLOAD: "true"
          LOCAL_MODEL_PATH: promoted_model_artifacts/model
          PYTHONPATH: .
        run: python src/training/copy_uc_model_version.py

  prod_smoke_test:
    runs-on: ubuntu-latest
    needs: promote_to_prod
    environment: prod

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install "mlflow[databricks]"
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install --no-deps -e .

      - name: Azure login for Databricks SPN
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Microsoft Entra token for Azure Databricks
        id: databricks_aad_token
        run: |
          echo "token=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken \
            -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Smoke test promoted prod model
        env:
          MLFLOW_TRACKING_URI: databricks
          MLFLOW_REGISTRY_URI: databricks-uc
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ steps.databricks_aad_token.outputs.token }}
          MODEL_NAME: ${{ vars.PROD_MODEL_NAME }}
          MODEL_VERSION: ${{ needs.promote_to_prod.outputs.promoted_model_version }}
          PREDICTION_INPUT_SIZE: "3072"
          PYTHONPATH: .
        run: python src/inference/predict.py

  prod_batch_inference:
    runs-on: ubuntu-latest
    needs:
      - promote_to_prod
      - prod_smoke_test
    environment: prod

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install "mlflow[databricks]"
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install databricks-sdk
          pip install --no-deps -e .

      - name: Azure login for Databricks SPN
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Microsoft Entra token for Azure Databricks
        id: databricks_aad_token
        run: |
          echo "token=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken \
            -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Download batch data from ADLS
        if: ${{ inputs.batch_data_path != '' }}
        run: |
          az storage blob download \
            --account-name ${{ vars.AZURE_STORAGE_ACCOUNT }} \
            --container-name ${{ vars.AZURE_STORAGE_CONTAINER }} \
            --name "${{ inputs.batch_data_path }}" \
            --file ./batch_input.csv \
            --auth-mode login \
            --no-progress || echo "Batch data not found, skipping batch inference"

      - name: Run batch inference and save to volume
        if: hashFiles('./batch_input.csv') != ''
        env:
          MLFLOW_TRACKING_URI: databricks
          MLFLOW_REGISTRY_URI: databricks-uc
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ steps.databricks_aad_token.outputs.token }}
          MODEL_NAME: ${{ vars.PROD_MODEL_NAME }}
          MODEL_VERSION: ${{ needs.promote_to_prod.outputs.promoted_model_version }}
          PREDICTION_INPUT_SIZE: "3072"
          BATCH_INPUT_PATH: ./batch_input.csv
          BATCH_OUTPUT_VOLUME_PATH: /Volumes/iakshaykr/default/prod/prod_predictions
          BATCH_SIZE: "64"
          PYTHONPATH: .
        run: python src/inference/batch_predict.py

  prod_live:
    runs-on: ubuntu-latest
    needs:
      - promote_to_prod
      - prod_smoke_test
    if: ${{ inputs.prod_live_input_values != '' }}
    environment: prod

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install "mlflow[databricks]"
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install --no-deps -e .

      - name: Azure login for Databricks SPN
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Microsoft Entra token for Azure Databricks
        id: databricks_aad_token
        run: |
          echo "token=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken \
            -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Run final prod prediction
        env:
          MLFLOW_TRACKING_URI: databricks
          MLFLOW_REGISTRY_URI: databricks-uc
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ steps.databricks_aad_token.outputs.token }}
          MODEL_NAME: ${{ vars.PROD_MODEL_NAME }}
          MODEL_VERSION: ${{ needs.promote_to_prod.outputs.promoted_model_version }}
          PREDICTION_INPUT_SIZE: "3072"
          PREDICTION_VALUES: ${{ inputs.prod_live_input_values }}
          PYTHONPATH: .
        run: python src/inference/predict.py
