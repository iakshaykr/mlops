  #         DATABRICKS_WAIT_FOR_COMPLETION: "true"
  #       run: python src/training/trigger_databricks_job.py

  model_registration:
    runs-on: ubuntu-latest
    # needs: databricks_job

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt "mlflow[databricks]"

      - name: Azure login for Databricks SPN
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Microsoft Entra token for Azure Databricks
        id: registration_databricks_aad_token
        run: |
          echo "token=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken \
            -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Register latest trained model
        env:
          MLFLOW_TRACKING_URI: databricks
          MLFLOW_REGISTRY_URI: databricks-uc
          DATABRICKS_HOST: https://adb-6701353639688524.4.azuredatabricks.net
          DATABRICKS_TOKEN: ${{ steps.registration_databricks_aad_token.outputs.token }}
          MLFLOW_EXPERIMENT_NAME: /Users/akshaykr9531@gmail.com/biometric-training
          MLFLOW_RUN_NAME: biometric-simple-model
          MLFLOW_MODEL_NAME: biometric_model
          MLFLOW_UC_CATALOG: ${{ vars.UC_CATALOG }}
          MLFLOW_UC_SCHEMA: ${{ vars.UC_SCHEMA }}
        run: python src/training/register_model.py

  model_validation:
    runs-on: ubuntu-latest
    needs: model_registration
    outputs:
      source_model_version: ${{ steps.validate_model.outputs.source_model_version }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt "mlflow[databricks]"

      - name: Azure login for Databricks SPN
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Microsoft Entra token for Azure Databricks
        id: promotion_databricks_aad_token
        run: |
          echo "token=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken \
            -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Validate downloaded UC model artifacts
        id: validate_model
        env:
          MLFLOW_TRACKING_URI: databricks
          MLFLOW_REGISTRY_URI: databricks-uc
          DATABRICKS_HOST: https://adb-6701353639688524.4.azuredatabricks.net
          DATABRICKS_TOKEN: ${{ steps.promotion_databricks_aad_token.outputs.token }}
          SOURCE_MODEL_NAME: biometric_model
          SOURCE_UC_CATALOG: ${{ vars.UC_CATALOG }}
          SOURCE_UC_SCHEMA: ${{ vars.UC_SCHEMA }}
          MODEL_DOWNLOAD_DIR: promoted_model_artifacts
          VALIDATION_ONLY: "true"
        run: python src/training/copy_uc_model_version.py

      - name: Upload validated model artifacts to ADLS
        run: |
          az storage blob upload-batch \
            --account-name projectmlops \
            --destination datacontainer \
            --destination-path prod/${{ github.run_id }}-${{ github.run_attempt }} \
            --source ./promoted_model_artifacts \
            --overwrite true \
            --auth-mode login

  # 🔹 Prod Stage
  promote_to_prod:
    runs-on: ubuntu-latest
    needs: model_validation
    environment: prod
    outputs:
      promoted_model_version: ${{ steps.promote_to_prod.outputs.promoted_model_version }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install "mlflow[databricks]"
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install --no-deps -e .

      - name: Azure login for Databricks SPN
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Microsoft Entra token for Azure Databricks
        id: promotion_apply_databricks_aad_token
        run: |
          echo "token=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken \
            -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Download model artifacts from ADLS
        run: |
          set -eu
          prefix="prod/${{ github.run_id }}-${{ github.run_attempt }}"
          dest_root="./promoted_model_artifacts/model"
          mkdir -p "$dest_root"

          blobs=$(az storage blob list \
            --account-name projectmlops \
            --container-name datacontainer \
            --prefix "$prefix/" \
            --auth-mode login \
            --query "[].name" \
            -o tsv)

          if [ -z "$blobs" ]; then
            echo "No blobs found under $prefix/" >&2
            exit 1
          fi

          while IFS= read -r blob_name; do
            [ -n "$blob_name" ] || continue

            case "$blobs" in
              *"$blob_name/"*)
                echo "Skipping prefix marker blob: $blob_name"
                continue
                ;;
            esac

            relative_path="${blob_name#"$prefix/"}"
            target_path="$dest_root/$relative_path"
            mkdir -p "$(dirname "$target_path")"

            az storage blob download \
              --account-name projectmlops \
              --container-name datacontainer \
              --name "$blob_name" \
              --file "$target_path" \
              --auth-mode login \
              --overwrite true \
              --no-progress
          done <<EOF
          $blobs
          EOF

      - name: Show promotion source paths
        run: |
          echo "ADLS source path: https://projectmlops.blob.core.windows.net/datacontainer/prod/${{ github.run_id }}-${{ github.run_attempt }}/"
          echo "Local registration path: ./promoted_model_artifacts/model"

      - name: Promote validated UC model version
        id: promote_to_prod
        env:
          MLFLOW_TRACKING_URI: databricks
          MLFLOW_REGISTRY_URI: databricks-uc
          DATABRICKS_HOST: https://adb-6701353639688524.4.azuredatabricks.net
          DATABRICKS_TOKEN: ${{ steps.promotion_apply_databricks_aad_token.outputs.token }}
          SOURCE_MODEL_NAME: biometric_model
          SOURCE_UC_CATALOG: ${{ vars.UC_CATALOG }}
          SOURCE_UC_SCHEMA: ${{ vars.UC_SCHEMA }}
          DESTINATION_MODEL_NAME: iakshaykr.default.prod
          SKIP_DOWNLOAD: "true"
          LOCAL_MODEL_PATH: promoted_model_artifacts/model
          PYTHONPATH: .
        run: python src/training/copy_uc_model_version.py

  prod_smoke_test:
    runs-on: ubuntu-latest
    needs: promote_to_prod
    environment: prod

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install "mlflow[databricks]"
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install --no-deps -e .

      - name: Azure login for Databricks SPN
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Microsoft Entra token for Azure Databricks
        id: databricks_aad_token
        run: |
          echo "token=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken \
            -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Smoke test promoted prod model
        env:
          MLFLOW_TRACKING_URI: databricks
          MLFLOW_REGISTRY_URI: databricks-uc
          DATABRICKS_HOST: https://adb-6701353639688524.4.azuredatabricks.net
          DATABRICKS_TOKEN: ${{ steps.databricks_aad_token.outputs.token }}
          MODEL_NAME: iakshaykr.default.prod
          MODEL_VERSION: ${{ needs.promote_to_prod.outputs.promoted_model_version }}
          PREDICTION_INPUT_SIZE: "3072"
          PYTHONPATH: .
        run: python src/training/load_and_predict.py
