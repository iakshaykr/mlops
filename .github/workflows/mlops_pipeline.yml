name: MLOps Pipeline

on:
  push:
    branches:
      - main
      - feature/biometric
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile Python files
        run: python -m py_compile src/biometric/download.py src/biometric/loader.py src/biometric/model.py src/training/train.py src/training/trigger_databricks_job.py src/training/register_model.py src/training/bootstrap_databricks_env.py tests/test_pipeline.py
      - name: Run tests
        run: pytest -q

  # 🔹 Stage 2: Data Pipeline
  data_pipeline:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Setup Kaggle API
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Download dataset
        run: |
          kaggle datasets download -d ninadmehendale/multimodal-iris-fingerprint-biometric-data
          unzip -o multimodal-iris-fingerprint-biometric-data.zip -d data

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload to ADLS
        run: |
          az storage blob upload-batch \
            --account-name projectmlops \
            --destination datacontainer \
            --source ./data \
            --overwrite true \
            --auth-mode login

  package_databricks_artifacts:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload Databricks dependency artifacts to ADLS
        run: |
          az storage blob upload-batch \
            --account-name projectmlops \
            --destination datacontainer/databricks-libs \
            --source ./dist \
            --overwrite true \
            --auth-mode login
          az storage blob upload \
            --account-name projectmlops \
            --container-name datacontainer \
            --name databricks-libs/requirements-databricks.txt \
            --file requirements-databricks.txt \
            --overwrite true \
            --auth-mode login

  databricks_job:
    runs-on: ubuntu-latest
    needs:
      - data_pipeline
      - package_databricks_artifacts
    outputs:
      databricks_run_id: ${{ steps.trigger_databricks_job.outputs.databricks_run_id }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Azure login for Databricks SPN
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Microsoft Entra token for Azure Databricks
        id: databricks_aad_token
        run: |
          echo "token=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken \
            -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Trigger Databricks job
        id: trigger_databricks_job
        env:
          DATABRICKS_HOST: https://adb-6701353639688524.4.azuredatabricks.net
          DATABRICKS_JOB_ID: "286717033859672"
          DATABRICKS_AAD_TOKEN: ${{ steps.databricks_aad_token.outputs.token }}
          DATABRICKS_WAIT_FOR_COMPLETION: "true"
        run: python src/training/trigger_databricks_job.py

  model_registration:
    runs-on: ubuntu-latest
    needs: databricks_job

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Azure login for Databricks SPN
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Microsoft Entra token for Azure Databricks
        id: registration_databricks_aad_token
        run: |
          echo "token=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken \
            -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Register latest trained model
        env:
          MLFLOW_TRACKING_URI: databricks
          DATABRICKS_HOST: https://adb-6701353639688524.4.azuredatabricks.net
          DATABRICKS_TOKEN: ${{ steps.registration_databricks_aad_token.outputs.token }}
          MLFLOW_EXPERIMENT_NAME: /Users/akshaykr9531@gmail.com/biometric-training
          MLFLOW_RUN_NAME: biometric-simple-model
          MLFLOW_MODEL_NAME: biometric_model
        run: python src/training/register_model.py
